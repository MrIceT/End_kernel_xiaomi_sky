name: Build GKI Kernel (Sky) with KsuN(pershoot) & SUSFS

on:
  workflow_dispatch:

env:
  KERNEL_SOURCE: "https://github.com/sky-lineage/android_kernel_xiaomi_sky"
  KERNEL_BRANCH: "lineage-23.2" # Change to your target branch
  DEFCONFIG: "gki_defconfig"   # Pure GKI builds usually use gki_defconfig
  ARCH: "arm64"

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Actions Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git python3 python-is-python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libelf-dev cpio lz4 zip \
            make wget ccache

      # - name: Download Toolchain
      #   run: |
      #     mkdir -p $GITHUB_WORKSPACE/toolchain
      #     cd $GITHUB_WORKSPACE/toolchain
      #     # Using an updated AOSP Clang toolchain
      #     git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-8490178.git aosp-clang
      #     echo "PATH=$GITHUB_WORKSPACE/toolchain/aosp-clang/bin:$PATH" >> $GITHUB_ENV
      
      # - name: Checkout Actions Repo
      #   uses: actions/checkout@v4

      # 1. Delete Microsoft, Android, and Java bloatware to free up ~30GB of disk space
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # 2. Now you safely have plenty of room to allocate a massive 20GB Swap file
      - name: Set up Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20


      - name: Download Toolchains (Clang + GCC)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          mkdir -p $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          
          echo "=== Downloading AOSP Clang-r416183b ==="
          cd $GITHUB_WORKSPACE/toolchain/clang
          wget -qO clang.tar.gz "https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/clang-r416183b.tar.gz"
          tar -xf clang.tar.gz
          rm clang.tar.gz
          
          echo "=== Downloading ARM GNU GCC 14.2.rel1 ==="
          cd $GITHUB_WORKSPACE/toolchain/gcc-aarch64
          wget -qO gcc.tar.xz "https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz"
          tar -xf gcc.tar.xz --strip-components=1
          rm gcc.tar.xz
          
          echo "=== Setting PATH Variables ==="
          echo "PATH=$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin:$PATH" >> $GITHUB_ENV

      # - name: Clone Kernel Source
      #   run: |
      #     git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel_workspace

      # - name: Integrate Kowsu & SUSFS
      #   run: |
      #     cd $GITHUB_WORKSPACE/kernel_workspace
      #
      #     echo "=== 1. Integrating Kowsu ==="
      #     curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -
      #
      #     echo "=== 2. Cloning SUSFS ==="
      #     git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs4ksu
      #
      #     echo "=== 3. Patching Kowsu for SUSFS ==="
      #     cd KernelSU
      #     patch -p1 < ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
      #     cd ..
      #
      #     echo "=== 4. Patching Kernel for SUSFS ==="
      #     patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch
      #
      #     echo "=== 5. Copying SUSFS Files ==="
      #     cp -r susfs4ksu/kernel_patches/fs/* fs/
      #     cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/
      
      - name: Setup tmate session for debugging
        uses: mxschmitt/action-tmate@v3


      - name: Integrate KSU-Next & SUSFS
        run: |
          # cd $GITHUB_WORKSPACE
          
          echo "=== 1. Integrating KSU-Next (pershoot dev-susfs) ==="
          # Execute the setup script directly from pershoot's fork and specify the dev-susfs branch
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          
          echo "=== 2. Cloning SUSFS ==="
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android12-5.10 susfs4ksu
          
          echo "=== 3. Patching Main Kernel for SUSFS ==="
          # Apply the core SUSFS kernel patch
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch || true
          
          echo "=== 4. Copying SUSFS source files ==="
          # Copy susfs.c and related header files directly into the kernel tree
          cp -r susfs4ksu/kernel_patches/fs/* fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/

      - name: Compile Kernel (Image)
        run: |
          # cd $GITHUB_WORKSPACE/kernel_workspace
          
          ARGS="O=out ARCH=${{ env.ARCH }} \
                CC=clang \
                CROSS_COMPILE=aarch64-none-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                LLVM=1 LLVM_IAS=1" 

          CUSTOM_NAME="-EndsusKernel"
         
          make $ARGS LOCALVERSION=$CUSTOM_NAME ${{ env.DEFCONFIG }}
          
          make -j$(nproc --all) $ARGS LOCALVERSION=$CUSTOM_NAME Image


      - name: Get Build Info (Date & Version)
        run: |
          # 1. Generate a clean date string (e.g., 20231025-1430)
          echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

          # 2. Ask the kernel for its exact version string
          cd $GITHUB_WORKSPACE/kernel_workspace

          # (Make sure the LOCALVERSION matches whatever you used in the compile step!)
          KERNEL_VER=$(make O=out ARCH=${{ env.ARCH }} LOCALVERSION="-EndsusKernel" kernelrelease)
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_ENV


      - name: Package into AnyKernel3 Flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE
          # Clone standard AnyKernel3 template
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          
          # Copy your freshly compiled Image into the AnyKernel folder
          cp out/arch/arm64/boot/Image anykernel/
          
          # Clean up unnecessary placeholders to match the structure you shared
          rm -f anykernel/README.md
          
          # Zip everything up
          cd anykernel

          # zip -r9 ../EndKernel-${{ env.KERNEL_VER }}-Sky-GKI-Build.zip
          
          rm -rf .git README.md

      
      - name: Upload Flashable Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: EndsusKernel-${{ env.KERNEL_VER }}-Sky-KSUN-SuSFS-${{ env.BUILD_DATE }}
          path: anykernel/
